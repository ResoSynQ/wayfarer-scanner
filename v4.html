<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayfarer Auto Scanner - Ver4.0 (オープンデータ版)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        #controls {
            position: absolute; top: 80px; left: 10px; 
            background: rgba(255, 255, 255, 0.95); padding: 15px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000; width: 320px; display: flex; flex-direction: column;
            max-height: calc(100vh - 100px); 
        }

        #category-area { overflow-y: auto; margin: 10px 0; padding-right: 5px; }

        details { background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; margin-bottom: 5px; padding: 5px; }
        
        /* 行政データ用の特別カラー */
        details.opendata-section { background: #fff3e0; border-color: #ffb74d; }
        
        summary { font-weight: bold; cursor: pointer; padding: 5px; outline: none; }
        .checkbox-list { display: flex; flex-direction: column; padding: 5px 10px; }
        .checkbox-list label { margin: 4px 0; font-size: 14px; }

        button {
            background-color: #007bff; color: white; border: none;
            padding: 12px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;
        }
        button:hover { background-color: #0056b3; }
        #btn-location { background-color: #28a745; margin-bottom: 5px;}
        #btn-location:hover { background-color: #1e7e34; }
        #loading { display: none; color: #d9534f; font-weight: bold; margin-top: 10px; text-align: center; }

        @media (max-width: 600px) {
            #controls { top: auto; bottom: 10px; left: 50%; transform: translateX(-50%); width: 90%; max-height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button id="btn-location">📍 現在地の周辺へ移動</button>
        
        <div id="category-area">
            <details class="opendata-section" open>
                <summary>👑 行政オープンデータ（最強） 🧡</summary>
                <div class="checkbox-list">
                    <label style="color:#e65100; font-weight:bold;">
                        <input type="checkbox" id="chk-opendata" checked> 
                        大阪府：都市公園・指定文化財
                    </label>
                    <span style="font-size:11px; color:gray;">※国・自治体のお墨付きデータ！審査通過率UP！</span>
                </div>
            </details>

            <details>
                <summary>💙 OpenStreetMap (有志データ)</summary>
                <div class="checkbox-list">
                    <label><input type="checkbox" class="osm-chk" value='node["historic"="memorial"]({bbox});node["historic"="monument"]({bbox});' checked> 🪨 記念碑・碑・モニュメント</label>
                    <label><input type="checkbox" class="osm-chk" value='node["amenity"="notice_board"]({bbox});' checked> 📋 掲示板</label>
                </div>
            </details>
        </div>

        <button id="btn-scan">🔍 スキャン開始！</button>
        <div id="loading">📡 スキャン中... (数秒お待ちください)</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([34.710, 135.510], 14); // 少し広めに表示
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

        const markersGroup = L.layerGroup().addTo(map);

        // カラーピン
        const blueIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });
        const orangeIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        // スキャン処理
        document.getElementById('btn-scan').addEventListener('click', async () => {
            document.getElementById('loading').style.display = "block";
            markersGroup.clearLayers();

            const runOpendata = document.getElementById('chk-opendata').checked;
            let openDataCount = 0;

            // 👑 行政オープンデータ（ローカルファイル）の読み込み
            if (runOpendata) {
                try {
                    // さっきアップロードしたファイルを読み込む！
                    const response = await fetch('osaka_data.geojson');
                    const geojsonData = await response.json();

                    // 画面の表示範囲を取得
                    const bounds = map.getBounds();

                    // データを地図にピンとして置く
                    L.geoJSON(geojsonData, {
                        pointToLayer: function (feature, latlng) {
                            return L.marker(latlng, {icon: orangeIcon});
                        },
                        onEachFeature: function (feature, layer) {
                            // 画面内にあるピンだけカウント
                            if(bounds.contains(layer.getLatLng())) {
                                openDataCount++;
                            }
                            layer.bindPopup(`<b>${feature.properties.name}</b><br><span style="color:#e65100;">🧡 ${feature.properties.category}</span><br><span style="font-size:10px;">出典: 行政オープンデータ</span>`);
                        }
                    }).addTo(markersGroup);

                } catch (error) {
                    console.error("データ読み込みエラー:", error);
                    alert("オープンデータの読み込みに失敗しました。");
                }
            }

            document.getElementById('loading').style.display = "none";
            alert(`スキャン完了！🔥\n・行政オープンデータ: ${openDataCount}件表示しました！`);
        });

        // 現在地ボタン
        document.getElementById('btn-location').addEventListener('click', () => {
            if (!navigator.geolocation) { alert("位置情報が使えません！"); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                }, () => { alert("位置情報を取得できませんでした。"); }
            );
        });
    </script>
</body>
</html>
