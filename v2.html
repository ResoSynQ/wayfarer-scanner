<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayfarer Auto Scanner - Ver2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* コントロールパネル：スマホ対応のスクロール設計 */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            max-height: 80vh; /* 画面の80%までの高さにする */
        }

        /* カテゴリ一覧をスクロールできるようにする */
        #category-area {
            overflow-y: auto;
            margin: 10px 0;
            padding-right: 5px;
        }

        /* 折りたたみメニュー（アコーディオン）のデザイン */
        details {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 5px;
            padding: 5px;
        }
        summary {
            font-weight: bold;
            cursor: pointer;
            padding: 5px;
            outline: none;
        }
        .checkbox-list {
            display: flex;
            flex-direction: column;
            padding: 5px 10px;
        }
        .checkbox-list label {
            margin: 4px 0;
            font-size: 14px;
        }

        button {
            background-color: #007bff; color: white; border: none;
            padding: 12px; border-radius: 5px;
            font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;
        }
        button:hover { background-color: #0056b3; }
        #btn-location { background-color: #28a745; margin-bottom: 5px;}
        #btn-location:hover { background-color: #1e7e34; }
        #loading { display: none; color: #d9534f; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button id="btn-location">📍 現在地の周辺へ移動</button>
        
        <div id="category-area">
            <details open> <summary>🏛️ 歴史・アート・文化</summary>
                <div class="checkbox-list">
                    <label><input type="checkbox" value='node["historic"="memorial"]({bbox});node["historic"="monument"]({bbox});' checked> 🪨 記念碑・碑・モニュメント</label>
                    <label><input type="checkbox" value='node["tourism"="artwork"]({bbox});' checked> 🎨 壁画・彫刻・パブリックアート</label>
                    <label><input type="checkbox" value='node["historic"="archaeological_site"]({bbox});node["historic"="ruins"]({bbox});node["historic"="tomb"]({bbox});'> 🏺 史跡・古墳・遺跡</label>
                </div>
            </details>

            <details>
                <summary>🏘️ 公共・コミュニティ</summary>
                <div class="checkbox-list">
                    <label><input type="checkbox" value='node["amenity"="notice_board"]({bbox});' checked> 📋 掲示板</label>
                    <label><input type="checkbox" value='node["amenity"="community_centre"]({bbox});way["amenity"="community_centre"]({bbox});' checked> 🏠 公民館・集会所・コミュニティセンター</label>
                    <label><input type="checkbox" value='node["tourism"="museum"]({bbox});node["tourism"="gallery"]({bbox});way["tourism"="museum"]({bbox});'> 🏛️ 博物館・美術館・資料館</label>
                    <label><input type="checkbox" value='node["amenity"="public_bookcase"]({bbox});'> 📚 私設図書館・リトルフリーライブラリー</label>
                </div>
            </details>

            <details>
                <summary>🌳 公園・アウトドア</summary>
                <div class="checkbox-list">
                    <label><input type="checkbox" value='node["leisure"="park"]({bbox});way["leisure"="park"]({bbox});node["place"="square"]({bbox});' checked> 🏞️ 公園・広場</label>
                    <label><input type="checkbox" value='node["amenity"="shelter"]({bbox});'> 🛖 東屋・パーゴラ（屋根付きベンチ）</label>
                    <label><input type="checkbox" value='node["leisure"="picnic_table"]({bbox});'> 🪑 ピクニックテーブル</label>
                </div>
            </details>

            <details>
                <summary>⚽ スポーツ・レジャー</summary>
                <div class="checkbox-list">
                    <label><input type="checkbox" value='node["leisure"="pitch"]({bbox});way["leisure"="pitch"]({bbox});'> ⚾ 野球場・テニス・各種グラウンド</label>
                    <label><input type="checkbox" value='node["leisure"="sports_centre"]({bbox});way["leisure"="sports_centre"]({bbox});'> 🏋️ スポーツジム・体育館</label>
                </div>
            </details>
        </div>

        <button id="btn-scan">🔍 チェックした候補をスキャン！</button>
        <div id="loading">📡 スキャン中... (数秒お待ちください)</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([34.710, 135.510], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        const markersGroup = L.layerGroup().addTo(map);

        // 現在地移動
        document.getElementById('btn-location').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("位置情報が使えません！"); return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    map.setView([pos.coords.latitude, pos.coords.longitude], 15);
                    L.circle([pos.coords.latitude, pos.coords.longitude], {radius: 500, color: 'blue'}).addTo(markersGroup);
                },
                () => { alert("位置情報を取得できませんでした。"); }
            );
        });

        // スキャン実行
        document.getElementById('btn-scan').addEventListener('click', () => {
            const b = map.getBounds();
            const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;

            let queryTags = "";
            // チェックされているすべてのチェックボックスを取得
            const checkboxes = document.querySelectorAll('.checkbox-list input[type="checkbox"]:checked');
            
            checkboxes.forEach(chk => {
                // {bbox} という文字を実際の座標に置き換えて追加
                queryTags += chk.value.replaceAll('{bbox}', bbox);
            });

            if(queryTags === "") {
                alert("探したいターゲットを1つ以上チェックしてください！"); return;
            }

            const query = `[out:json][timeout:25];(${queryTags});out center;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            document.getElementById('loading').style.display = "block";
            markersGroup.clearLayers();

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').style.display = "none";
                    if(data.elements.length === 0) {
                        alert("この範囲には候補が見つかりませんでした！"); return;
                    }

                    data.elements.forEach(el => {
                        const lat = el.lat || el.center.lat;
                        const lon = el.lon || el.center.lon;
                        const name = el.tags && el.tags.name ? el.tags.name : "名前なしの候補";
                        
                        // タグから種類を適当に抽出して表示
                        let typeInfo = "候補地";
                        if(el.tags.historic) typeInfo = `歴史(${el.tags.historic})`;
                        if(el.tags.amenity) typeInfo = `施設(${el.tags.amenity})`;
                        if(el.tags.leisure) typeInfo = `レジャー(${el.tags.leisure})`;
                        if(el.tags.tourism) typeInfo = `観光/アート(${el.tags.tourism})`;

                        const marker = L.marker([lat, lon]).addTo(markersGroup);
                        marker.bindPopup(`<b>${name}</b><br><span style="font-size:12px;color:gray;">${typeInfo}</span>`);
                    });
                    alert(`${data.elements.length} 件のお宝候補を発見しました！🔥`);
                })
                .catch(error => {
                    document.getElementById('loading').style.display = "none";
                    alert("通信エラー。範囲を少し狭めて再実行してください！");
                    console.error(error);
                });
        });
    </script>
</body>
</html>
