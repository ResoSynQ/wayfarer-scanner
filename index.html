<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayfarer Auto Scanner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { width: 100vw; height: 100vh; }
        
        /* コントロールパネルのデザイン */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .target-checks { text-align: left; margin-bottom: 10px; }
        .target-checks label { display: block; margin: 5px 0; font-weight: bold; }
        button {
            background-color: #007bff; color: white; border: none;
            padding: 10px 15px; margin: 5px; border-radius: 5px;
            font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;
        }
        button:hover { background-color: #0056b3; }
        #btn-location { background-color: #28a745; }
        #btn-location:hover { background-color: #1e7e34; }
        #loading { display: none; color: #d9534f; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="controls">
        <button id="btn-location">📍 現在地の周辺へ移動</button>
        <hr>
        <div class="target-checks">
            <label><input type="checkbox" id="chk-notice" checked> 📋 掲示板 (Notice Board)</label>
            <label><input type="checkbox" id="chk-memorial" checked> 🪨 石碑・記念碑 (Memorial)</label>
            <label><input type="checkbox" id="chk-worship" checked> ⛩️ 神社・寺院 (Worship)</label>
            <label><input type="checkbox" id="chk-park" checked> 🏞️ 公園 (Park)</label>
        </div>
        <button id="btn-scan">🔍 この画面の範囲をスキャン！</button>
        <div id="loading">📡 スキャン中... (数秒お待ちください)</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 地図の初期設定 (初期位置は大阪・天神橋付近に設定)
        const map = L.map('map').setView([34.710, 135.510], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // マーカーを管理するグループ
        const markersGroup = L.layerGroup().addTo(map);

        // 2. 現在地を取得して移動する機能
        document.getElementById('btn-location').addEventListener('click', () => {
            if (!navigator.geolocation) {
                alert("お使いのブラウザは現在地取得に対応していません！");
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    map.setView([lat, lng], 15); // 現在地に移動してズーム
                    L.circle([lat, lng], {radius: 500, color: 'blue', fillOpacity: 0.1}).addTo(markersGroup);
                    alert("現在地に移動しました！「スキャン」を押して探索してください！");
                },
                () => { alert("現在地を取得できませんでした。スマホの位置情報設定を確認してください！"); }
            );
        });

        // 3. Overpass APIでスキャンする機能
        document.getElementById('btn-scan').addEventListener('click', () => {
            // 画面に映っている範囲(Bounding Box)を取得
            const bounds = map.getBounds();
            const s = bounds.getSouth();
            const w = bounds.getWest();
            const n = bounds.getNorth();
            const e = bounds.getEast();
            const bbox = `${s},${w},${n},${e}`;

            // チェックされたカテゴリのクエリを作成
            let queryTags = "";
            if(document.getElementById('chk-notice').checked) queryTags += `node["amenity"="notice_board"](${bbox});`;
            if(document.getElementById('chk-memorial').checked) queryTags += `node["historic"="memorial"](${bbox});`;
            if(document.getElementById('chk-worship').checked) queryTags += `node["amenity"="place_of_worship"](${bbox}); way["amenity"="place_of_worship"](${bbox});`;
            if(document.getElementById('chk-park').checked) queryTags += `node["leisure"="park"](${bbox}); way["leisure"="park"](${bbox});`;

            if(queryTags === "") {
                alert("探したいターゲットにチェックを入れてください！");
                return;
            }

            // Overpass QLの組み立て
            const query = `[out:json][timeout:25];(${queryTags});out center;`;
            const url = `https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`;

            // スキャン開始
            document.getElementById('loading').style.display = "block";
            markersGroup.clearLayers(); // 古いピンを消す

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading').style.display = "none";
                    if(data.elements.length === 0) {
                        alert("この範囲には候補が見つかりませんでした！別の場所へ移動してください。");
                        return;
                    }

                    // 見つかったデータにピンを立てる
                    data.elements.forEach(el => {
                        const lat = el.lat || el.center.lat;
                        const lon = el.lon || el.center.lon;
                        
                        // タグから名前を取得（なければ「名前なし」）
                        const name = el.tags && el.tags.name ? el.tags.name : "名前なしの候補";
                        const type = el.tags.amenity || el.tags.historic || el.tags.leisure || "候補";

                        const marker = L.marker([lat, lon]).addTo(markersGroup);
                        marker.bindPopup(`<b>${name}</b><br>種類: ${type}`);
                    });
                    alert(`${data.elements.length} 件の候補を発見しました！🔥`);
                })
                .catch(error => {
                    document.getElementById('loading').style.display = "none";
                    alert("通信エラーが発生しました。範囲が広すぎるか、APIが混雑しています！");
                    console.error(error);
                });
        });
    </script>
</body>
</html>
